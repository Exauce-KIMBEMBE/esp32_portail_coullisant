<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portail Connecté</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <header class="topbar">
    <div>
      <h1>Portail Connecté</h1>
      <p>Contrôle intelligent du portail coulissant</p>
    </div>

    <button id="connectBtn" onclick="manualReconnect()">↻</button>
  </header>

  <section class="panel status-line">
    <span id="connectionText">Déconnecté</span>
    <span id="rtcTime">--:--:--</span>
  </section>

  <section class="panel leds">
    <div>
      <span id="redLed" class="led off"></span>
      <small>Rouge</small>
    </div>

    <div>
      <span id="greenLed" class="led off"></span>
      <small>Vert</small>
    </div>

    <div>
      <span id="buzzerLed" class="led off"></span>
      <small>Buzzer</small>
    </div>
  </section>

  <section class="panel gate">
    <div id="gateIndicator" class="gate-indicator unknown"></div>
    <h2 id="gateState">État inconnu</h2>
    <p id="motorState">Moteur : --</p>
    <p id="obstacleState">Obstacle : --</p>
  </section>

  <section class="panel controls">
    <button class="home" onclick="sendCommand('home')">Home</button>
    <button class="open" onclick="sendCommand('open')">Ouvrir</button>
    <button class="close" onclick="sendCommand('close')">Fermer</button>
    <button class="stop" onclick="sendCommand('stop')">Stop</button>
  </section>

  <section class="panel settings">
    <label>
      Vitesse <b><span id="speedValue">50</span>%</b>
      <input type="range" id="motorSpeed" min="10" max="100" value="50">
    </label>

    <label>
      Obstacle <b><span id="distanceValue">40</span> cm</b>
      <input type="range" id="obstacleDistance" min="10" max="150" value="40">
    </label>

    <label>
      Tempo auto
      <input type="number" id="autoCloseDelay" min="5" max="600" value="30">
    </label>

    <button class="save" onclick="saveSettings()">Enregistrer</button>
  </section>

  <section class="panel">
    <button class="history-btn" onclick="toggleHistory()">Historique</button>

    <div id="historyBox" class="hidden">
      <ul id="logs"></ul>
      <button class="pdf" onclick="downloadLogsPDF()">Télécharger PDF</button>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-line"></div>
    <p>Portail Connecté © 2026</p>
    <small>ESP32 • Contrôle Web • IR • Automatisation</small>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
